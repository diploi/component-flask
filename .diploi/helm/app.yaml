apiVersion: apps/v1
kind: Deployment
metadata:
  name: app
  labels:
    app: app
spec:
  selector:
    matchLabels:
      app: app
  strategy:
  {{- if eq .Values.stage "development"}}
    type: Recreate
  {{- else }}
    type: RollingUpdate
    rollingUpdate:
      maxUnavailable: 25%
      maxSurge: 25%
  {{- end }}
  replicas: {{ ternary 1 0 .Values.enabled }}
  template:
    metadata:
      labels:
        app: app
    spec:
      terminationGracePeriodSeconds: 10
      imagePullSecrets:
        - name: diploi-pull-secret
      {{- if eq .Values.stage "development"}}
      securityContext:
        runAsUser: 1000
        runAsGroup: 1000
      initContainers:
        - name: install-dependencies
          image: {{ .Values.images.app }}
          imagePullPolicy: Always
          command: ["/bin/sh", "-c"]
          args:
            - |
              set -e
              uv python install {{ ((.Values.envMap.PYTHON_VERSION).value | default "3.12") | quote }}
              uv venv .venv --clear
              if [ -f pyproject.toml ]; then
                uv sync
              elif [ -f requirements.txt ]; then
                uv pip install -r requirements.txt
              fi
          env:
            - name: UV_PYTHON
              value: {{ ((.Values.envMap.PYTHON_VERSION).value | default "3.12") | quote }}
            - name: UV_PYTHON_INSTALL_DIR
              value: /app{{ .Values.folder }}/.python
          workingDir: /app{{ .Values.folder }}
          volumeMounts:
            - name: app-mount
              mountPath: /app
      {{- end }}
      containers:
        - name: app
          image: {{ .Values.images.app }}
          imagePullPolicy: Always
          ports:
            - containerPort: 8000
          {{- if eq .Values.stage "development" }}
          {{- with .Values.containerCommands.developmentStart }}
          command:
            - /bin/sh
            - -c
            - |
          {{ . | nindent 14 }}
          {{- end }}
          {{- else }}
          {{- with .Values.containerCommands.productionStart }}
          command:
            - /bin/sh
            - -c
            - |
          {{ . | nindent 14 }}
          {{- end }}
          {{- end }}
          env:
            - name: UV_PYTHON
              value: {{ ((.Values.envMap.PYTHON_VERSION).value | default "3.12") | quote }}
            - name: UV_PYTHON_INSTALL_DIR
              value: /app{{ .Values.folder }}/.python
            {{- range .Values.env }}
            - name: {{ .identifier }}
              value: {{ .value | quote }}
            {{- end }}
          {{- if eq .Values.stage "development"}}
          workingDir: /app{{ .Values.folder }}
          {{- end }}
          volumeMounts:
            {{- if hasKey .Values.storage "code" }}
            - name: app-mount
              mountPath: /app
            {{- end }}        
      volumes:
        {{- if hasKey .Values.storage "code" }}
        - name: app-mount
          hostPath:
            path: {{ .Values.storage.code.hostPath }}
        {{- end }}